<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080705">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🏐 Vôlei Mores</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080705; --card:#141210; --card2:#1c1a15;
  --gold:#FFB800; --gold2:#e07b00;
  --white:#f5f0e8; --muted:#6b6050; --border:#2a2418;
  --green:#18b86a; --red:#e63030;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{height:100%;}
body{
  background:var(--bg); color:var(--white);
  font-family:'Barlow',sans-serif; min-height:100%;
  background-image:radial-gradient(ellipse at 50% 0%,rgba(255,184,0,0.07) 0%,transparent 55%);
  padding-bottom:calc(1rem + var(--safe-bottom));
}

/* ── HEADER ── */
header{
  text-align:center; padding:1.8rem 1rem 0; position:relative; overflow:hidden;
}
.header-bg{position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,184,0,0.06) 0%,transparent 100%);pointer-events:none;}
.header-slash{width:100%;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:.9rem 0 0;}
.logo-line{display:flex;align-items:center;justify-content:center;gap:.5rem;}
.logo-icon{font-size:1.8rem;}
h1{
  font-family:'Anton',sans-serif;
  font-size:clamp(2rem,9vw,4rem);
  letter-spacing:3px; color:var(--gold); text-transform:uppercase;
  text-shadow:0 0 30px rgba(255,184,0,0.3); line-height:1;
}
.subtitle{font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-top:.2rem;}

/* ── TABS (sticky) ── */
.container{max-width:680px;margin:0 auto;padding:0 .75rem 2rem;}
.tabs-wrap{
  position:sticky;top:0;z-index:100;
  background:var(--bg);
  border-bottom:2px solid var(--border);
  margin-bottom:1.4rem;
}
.tabs{display:flex;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab-btn{
  flex:1;min-width:0;padding:.8rem .5rem;
  background:transparent;border:none;color:var(--muted);
  font-family:'Barlow Condensed',sans-serif;font-size:.78rem;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;cursor:pointer;
  border-bottom:3px solid transparent;margin-bottom:-2px;
  transition:color .2s;white-space:nowrap;
}
.tab-btn:active{opacity:.7;}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);}
.tab-content{display:none;}
.tab-content.active{display:block;animation:fadeIn .18s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ── INPUTS (16px prevents iOS zoom) ── */
input[type="text"],textarea,select{
  width:100%;background:var(--card2);border:1px solid var(--border);
  border-radius:8px;padding:.75rem 1rem;
  color:var(--white);font-family:'Barlow Condensed',sans-serif;
  font-size:16px;font-weight:600;outline:none;transition:border-color .2s;
  -webkit-appearance:none;
}
input[type="text"]:focus,textarea:focus,select:focus{border-color:var(--gold);}
input::placeholder,textarea::placeholder{color:var(--muted);}
textarea{resize:vertical;min-height:100px;line-height:1.6;}
select{cursor:pointer;appearance:none;}

/* ── BUTTONS ── */
.btn{
  min-height:44px;padding:.6rem 1.2rem;border-radius:8px;border:none;cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;font-size:.9rem;font-weight:700;
  letter-spacing:.8px;text-transform:uppercase;transition:transform .1s,opacity .15s;
  display:inline-flex;align-items:center;justify-content:center;gap:.3rem;
}
.btn:active{transform:scale(.96);}
.btn-gold{background:var(--gold);color:#000;}
.btn-danger{background:rgba(230,48,48,.15);color:#ff6060;border:1px solid rgba(230,48,48,.3);}
.btn-ghost{background:var(--card2);color:var(--muted);border:1px solid var(--border);}
.btn-green{background:rgba(24,184,106,.15);color:var(--green);border:1px solid rgba(24,184,106,.3);}
.btn-full{width:100%;margin-bottom:.5rem;}
.btn-big{min-height:50px;font-size:1rem;}

.section-title{font-family:'Anton',sans-serif;font-size:1.05rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:.9rem;}
.gold-title{color:var(--gold);}

/* ── PANEL ── */
.panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.1rem;}

/* ════ SORTEIO ════ */
.name-input-row{display:flex;gap:.5rem;margin-bottom:.8rem;}
.name-input-row input{flex:1;}
.name-list{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.7rem;min-height:28px;}
.chip{
  background:var(--card2);border:1px solid var(--border);border-radius:20px;
  padding:.22rem .65rem .22rem .75rem;font-family:'Barlow Condensed',sans-serif;
  font-size:.85rem;font-weight:600;display:flex;align-items:center;gap:.4rem;
  animation:chipPop .2s ease;
}
@keyframes chipPop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
.rm{cursor:pointer;color:var(--muted);font-size:.7rem;padding:2px;}
.rm:active{color:var(--red);}
.name-count{font-family:'Barlow Condensed',sans-serif;font-size:.78rem;letter-spacing:1px;color:var(--muted);margin-top:.5rem;}

/* Sorteio config row */
.sort-config{display:flex;gap:.8rem;align-items:flex-end;margin-bottom:1rem;}
.sort-config select{flex:1;}

/* Team result cards */
.team-grid-4{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-top:1rem;}
@media(max-width:380px){.team-grid-4{grid-template-columns:1fr;}}
.team-result-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.trc-header{display:flex;align-items:center;gap:.5rem;padding:.7rem .85rem;}
.trc-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.trc-name{font-family:'Anton',sans-serif;font-size:.95rem;letter-spacing:1px;text-transform:uppercase;}
.trc-body{padding:.2rem .85rem .75rem;}
.member-row{
  display:flex;align-items:center;gap:.5rem;padding:.32rem 0;
  border-bottom:1px solid var(--border);
  font-family:'Barlow Condensed',sans-serif;font-size:.92rem;font-weight:600;
  animation:slideIn .3s ease both;
}
.member-row:last-child{border-bottom:none;}
@keyframes slideIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}
.mem-num{font-family:'Anton',sans-serif;font-size:.72rem;color:var(--muted);min-width:14px;}

/* ════ TIMES ════ */
.teams-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.2rem;}
@media(max-width:380px){.teams-grid{grid-template-columns:1fr;}}
.team-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1rem;position:relative;}
.tc-num{font-family:'Anton',sans-serif;font-size:2.8rem;color:var(--border);position:absolute;top:.4rem;right:.7rem;line-height:1;user-select:none;}
.tc-label{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem;}
.color-row{display:flex;gap:.38rem;flex-wrap:wrap;margin-top:.7rem;}
.color-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s;}
.color-dot:active{transform:scale(1.2);}
.color-dot.sel{border-color:#fff;transform:scale(1.12);}
.tc-members{margin-top:.8rem;padding-top:.8rem;border-top:1px solid var(--border);}
.tc-members-title{font-family:'Barlow Condensed',sans-serif;font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem;}
.tc-member-item{font-family:'Barlow Condensed',sans-serif;font-size:.85rem;padding:.18rem 0;color:var(--white);opacity:.85;}

/* ════ CHAVEAMENTO ════ */
.bracket-hint{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;letter-spacing:1px;color:var(--muted);text-align:center;margin-bottom:.8rem;}
.bracket-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:.5rem;margin:0 -.75rem;padding-left:.75rem;padding-right:.75rem;}
.bracket{display:flex;align-items:stretch;min-width:520px;gap:0;}
.b-round{display:flex;flex-direction:column;flex:1;padding:0 .4rem;}
.b-round-title{font-family:'Barlow Condensed',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:.9rem;}
.b-col{display:flex;flex-direction:column;gap:1.2rem;flex:1;}
.b-group-label{font-family:'Barlow Condensed',sans-serif;font-size:.6rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:.3rem;}
.b-group-label.gold{color:var(--gold);}
.b-conn{display:flex;flex-direction:column;justify-content:space-around;width:18px;align-self:stretch;}
.b-conn-t{flex:1;border-right:2px solid var(--border);border-bottom:2px solid var(--border);border-radius:0 0 4px 0;}
.b-conn-b{flex:1;border-right:2px solid var(--border);border-top:2px solid var(--border);border-radius:0 4px 0 0;}

/* Match card */
.b-match{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.b-match.final-match{border-color:rgba(255,184,0,.4);box-shadow:0 0 16px rgba(255,184,0,.1);}

/* Match internals */
.b-team{display:flex;align-items:center;padding:.55rem .75rem;font-family:'Barlow Condensed',sans-serif;font-size:.9rem;font-weight:700;gap:.45rem;}
.b-team+.b-team{border-top:1px solid var(--border);}
.b-tdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.b-tname{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.b-tscore{font-family:'Anton',sans-serif;font-size:1.1rem;min-width:20px;text-align:right;}
.b-team.bwinner{background:rgba(255,184,0,.07);}
.b-team.bwinner .b-tname{color:var(--gold);}
.b-team.btbd .b-tname{color:var(--muted);font-style:italic;font-weight:400;}

/* Controls */
.b-ctrl-wrap{border-top:1px solid var(--border);background:var(--card2);}
.b-ctrl-top{display:flex;align-items:center;justify-content:space-between;padding:.35rem .75rem .2rem;}
.b-ctrl-main{display:flex;align-items:center;justify-content:center;gap:.4rem;padding:.3rem .5rem .4rem;flex-wrap:wrap;}
.live-badge{display:inline-flex;align-items:center;gap:3px;font-family:'Barlow Condensed',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#ff6060;padding:.1rem .45rem;background:rgba(230,48,48,.15);border-radius:20px;border:1px solid rgba(230,48,48,.3);}
.live-dot{width:5px;height:5px;border-radius:50%;background:#ff6060;animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btimer{font-family:'Anton',sans-serif;font-size:.8rem;color:var(--muted);letter-spacing:1px;}
.bsc-group{display:flex;align-items:center;gap:.3rem;}
.bsc-btn{width:42px;height:42px;border-radius:8px;border:none;cursor:pointer;font-size:1.2rem;font-weight:900;display:flex;align-items:center;justify-content:center;transition:transform .1s;}
.bsc-btn:active{transform:scale(.88);}
.bsc-plus{background:var(--gold);color:#000;}
.bsc-minus{background:var(--card);color:var(--muted);border:1px solid var(--border);}
.b-live-num{font-family:'Anton',sans-serif;font-size:1.6rem;min-width:28px;text-align:center;}
.b-vs-sep{font-family:'Anton',sans-serif;font-size:.85rem;color:var(--muted);}
.b-sets-row{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;padding:.3rem .6rem .25rem;}
.b-set-chip{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;font-weight:700;padding:.1rem .45rem;border-radius:4px;background:var(--card);border:1px solid var(--border);color:var(--muted);}
.b-set-chip.wa{color:var(--gold);border-color:rgba(255,184,0,.3);}
.b-set-chip.wb{color:#9ca3af;border-color:rgba(156,163,175,.3);}
.b-set-time{font-size:.55rem;opacity:.65;margin-left:2px;}

/* champion */
.champion-box{text-align:center;padding:1.6rem 1rem;background:linear-gradient(135deg,rgba(255,184,0,.1),rgba(224,123,0,.06));border:1px solid rgba(255,184,0,.25);border-radius:12px;margin-top:1.3rem;}
.ch-trophy{font-size:3rem;}
.ch-label{font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-top:.4rem;}
.ch-name{font-family:'Anton',sans-serif;font-size:2.4rem;letter-spacing:2px;margin-top:.2rem;}
.ch-third{font-family:'Barlow Condensed',sans-serif;font-size:.88rem;color:var(--muted);margin-top:.7rem;}

/* ════ PÓDIO ════ */
.podium-section{margin-top:2rem;padding-top:1.8rem;border-top:1px solid var(--border);}
.podium-title{font-family:'Anton',sans-serif;font-size:1rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:1.6rem;}
.podium-stage{display:flex;align-items:flex-end;justify-content:center;gap:.5rem;}
.podium-slot{display:flex;flex-direction:column;align-items:center;flex:1;max-width:160px;animation:riseUp .5s ease both;}
@keyframes riseUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.podium-medal{font-size:1.6rem;margin-bottom:.3rem;}
.podium-dot2{width:10px;height:10px;border-radius:50%;margin-bottom:.3rem;}
.podium-team-name{font-family:'Anton',sans-serif;font-size:.85rem;letter-spacing:.5px;text-transform:uppercase;text-align:center;margin-bottom:.4rem;line-height:1.2;}
.podium-block{width:100%;border-radius:5px 5px 0 0;display:flex;flex-direction:column;align-items:center;padding-top:.8rem;}
.podium-pos{font-family:'Anton',sans-serif;font-size:2.2rem;line-height:1;}
.podium-pos-label{font-family:'Barlow Condensed',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-top:.15rem;opacity:.6;}
.p1 .podium-block{height:130px;background:linear-gradient(180deg,rgba(255,184,0,.22),rgba(255,184,0,.06));border:1px solid rgba(255,184,0,.3);box-shadow:0 0 20px rgba(255,184,0,.15);}
.p1 .podium-pos{color:var(--gold);}
.p2 .podium-block{height:100px;background:linear-gradient(180deg,rgba(180,180,190,.14),rgba(180,180,190,.03));border:1px solid rgba(180,180,190,.2);}
.p2 .podium-pos{color:#b0b8c8;}
.p3 .podium-block{height:76px;background:linear-gradient(180deg,rgba(180,100,40,.16),rgba(180,100,40,.03));border:1px solid rgba(180,100,40,.25);}
.p3 .podium-pos{color:#c87840;}
.p4 .podium-block{height:56px;background:linear-gradient(180deg,rgba(70,70,70,.13),rgba(70,70,70,.03));border:1px solid rgba(70,70,70,.2);}
.p4 .podium-pos{color:var(--muted);font-size:1.7rem;}
.podium-members{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;color:var(--muted);text-align:center;margin-top:.3rem;line-height:1.5;}

/* ════ ESTATÍSTICAS ════ */
.stats-section{margin-top:2rem;padding-top:1.8rem;border-top:1px solid var(--border);}
.stats-title{font-family:'Anton',sans-serif;font-size:1rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:1rem;}
.stats-table{width:100%;border-collapse:collapse;background:var(--card);border-radius:10px;overflow:hidden;}
.stats-table th{background:var(--card2);padding:.65rem .7rem;font-family:'Barlow Condensed',sans-serif;font-size:.63rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-align:center;}
.stats-table th:first-child,.stats-table td:first-child{text-align:left;}
.stats-table td{padding:.75rem .7rem;border-top:1px solid var(--border);text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:.9rem;font-weight:600;}
.stats-table tr:active td{background:var(--card2);}
.rnk{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:5px;font-family:'Anton',sans-serif;font-size:.78rem;margin-right:.3rem;}
.r1{background:linear-gradient(135deg,#FFB800,#e07b00);color:#000;}
.r2{background:#2a2418;color:#8a7050;}
.r3{background:#1a1510;color:#5a4830;}
.r4{background:var(--card2);color:var(--muted);}
.pts-c{color:var(--gold);font-size:1rem;font-family:'Anton',sans-serif;}
.w-c{color:var(--green);}
.l-c{color:#f87171;}
.stat-bar-wrap{display:inline-block;width:50px;height:5px;background:var(--card2);border-radius:3px;overflow:hidden;vertical-align:middle;margin-left:.3rem;}
.stat-bar{height:100%;border-radius:3px;transition:width .8s ease;}

/* ── EMPTY ── */
.empty{text-align:center;padding:2.5rem 1rem;color:var(--muted);}
.empty .ei{font-size:2.4rem;margin-bottom:.6rem;}
.empty p{font-family:'Barlow Condensed',sans-serif;font-size:.95rem;letter-spacing:1px;}

/* Score flash */
@keyframes scoreFlash{0%{transform:scale(1)}30%{transform:scale(1.4)}100%{transform:scale(1)}}
.score-flash{animation:scoreFlash .28s ease;}
</style>
</head>
<body>

<header>
  <div class="header-bg"></div>
  <div class="logo-line">
    <span class="logo-icon">🏐</span>
    <h1>Vôlei Mores</h1>
    <span class="logo-icon">🦁</span>
  </div>
  <p class="subtitle">Gincana de Vôlei</p>
  <div class="header-slash"></div>
</header>

<div class="container" style="padding-top:1.2rem">
  <div class="tabs-wrap">
    <nav class="tabs">
      <button class="tab-btn active" onclick="goTab('sorteio',this)">🎲 Sorteio</button>
      <button class="tab-btn"        onclick="goTab('times',this)">🏅 Times</button>
      <button class="tab-btn"        onclick="goTab('chaveamento',this)">🏆 Chave</button>
    </nav>
  </div>

  <!-- SORTEIO -->
  <div id="tab-sorteio" class="tab-content active">
    <div class="panel" style="margin-bottom:.9rem">
      <div class="section-title gold-title">Adicionar Pessoas</div>
      <div class="name-input-row">
        <input type="text" id="nameIn" placeholder="Nome da pessoa..." onkeydown="if(event.key==='Enter')addName()">
        <button class="btn btn-gold" onclick="addName()" style="white-space:nowrap;flex-shrink:0;padding:.6rem .9rem">+</button>
      </div>
      <textarea id="bulkIn" placeholder="Ou cole vários nomes (um por linha)..."></textarea>
      <button class="btn btn-ghost btn-full" onclick="addBulk()" style="margin-top:.5rem;font-size:.82rem">Adicionar em massa ↑</button>
      <div class="name-count" id="nameCount" style="margin-top:.6rem">0 pessoas</div>
      <div class="name-list" id="nameList"></div>
    </div>

    <div class="panel" style="margin-bottom:.9rem">
      <div class="section-title gold-title">Sortear</div>
      <div class="sort-config">
        <div style="flex:1">
          <label style="font-family:'Barlow Condensed',sans-serif;font-size:.68rem;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:.35rem">Por time</label>
          <select id="perTeam" onchange="updateCount()">
            <option value="4">4 pessoas</option>
            <option value="5">5 pessoas</option>
            <option value="6" selected>6 pessoas</option>
            <option value="7">7 pessoas</option>
            <option value="8">8 pessoas</option>
          </select>
        </div>
      </div>
      <button class="btn btn-gold btn-full btn-big" onclick="doSorteio()">🎲 Sortear Times!</button>
      <button class="btn btn-danger btn-full" onclick="clearSorteio()" style="font-size:.82rem">✕ Limpar tudo</button>
      <div id="sInfo" style="margin-top:.6rem;font-family:'Barlow Condensed',sans-serif;font-size:.8rem;color:var(--muted);text-align:center;letter-spacing:1px"></div>
    </div>

    <div id="sResult"></div>
  </div>

  <!-- TIMES -->
  <div id="tab-times" class="tab-content">
    <div class="teams-grid" id="teamsGrid"></div>
    <button class="btn btn-gold btn-full btn-big" onclick="saveTeams()">✓ Salvar Times</button>
  </div>

  <!-- CHAVEAMENTO -->
  <div id="tab-chaveamento" class="tab-content">
    <div style="display:flex;gap:.6rem;margin-bottom:1rem;flex-wrap:wrap;">
      <button class="btn btn-gold btn-big" onclick="randomBracket()" style="flex:1">🎲 Sortear Chaveamento</button>
      <button class="btn btn-ghost"        onclick="resetBracket()" style="padding:.6rem .9rem">↺</button>
    </div>
    <div class="bracket-hint">← deslize para ver o chaveamento completo →</div>
    <div class="bracket-wrap"><div id="bView"></div></div>
    <div id="champDiv"></div>
    <div id="podiumDiv"></div>
    <div id="statsDiv"></div>
  </div>
</div>

<script>
// ════ STATE ════
const COLORS=['#FFB800','#ef4444','#3b82f6','#10b981','#a855f7','#ec4899','#f97316','#06b6d4'];
const CLR=['Ouro','Vermelho','Azul','Verde','Roxo','Rosa','Laranja','Ciano'];

let teams=[
  {name:'Time 1',color:COLORS[0],members:[]},
  {name:'Time 2',color:COLORS[1],members:[]},
  {name:'Time 3',color:COLORS[2],members:[]},
  {name:'Time 4',color:COLORS[3],members:[]},
];
let people=[];

// bracket.sets format: [scoreA, scoreB, durationSeconds]
function mkM(){ return {scoreA:0,scoreB:0,sets:[],status:'pending',setStart:null}; }
let bracket={seeded:false,slots:[null,null,null,null],sf1:mkM(),sf2:mkM(),final:mkM(),third:mkM()};

// timers
let timers={};

// ════ TABS ════
function goTab(id,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='times')       renderTeams();
  if(id==='chaveamento') renderBracket();
}

// ════ SORTEIO ════
function addName(){
  const el=document.getElementById('nameIn');
  const n=el.value.trim(); if(!n)return;
  people.push(n); el.value=''; el.focus(); renderNameList();
}
function addBulk(){
  const v=document.getElementById('bulkIn').value.trim(); if(!v)return;
  v.split('\n').map(s=>s.trim()).filter(Boolean).forEach(n=>people.push(n));
  document.getElementById('bulkIn').value=''; renderNameList();
}
function removePerson(i){ people.splice(i,1); renderNameList(); }
function updateCount(){ renderNameList(); }

function renderNameList(){
  const per=+document.getElementById('perTeam').value||6;
  const needed=per*4, diff=needed-people.length;
  document.getElementById('nameList').innerHTML=people.map((p,i)=>`
    <div class="chip"><span>${p}</span><span class="rm" onclick="removePerson(${i})">✕</span></div>`).join('');
  const cnt=document.getElementById('nameCount');
  if(diff<=0){cnt.textContent=`${people.length} pessoas · ✓ pronto!`;cnt.style.color='var(--green)';}
  else{cnt.textContent=`${people.length} / ${needed} (faltam ${diff})`;cnt.style.color='var(--muted)';}
}

function doSorteio(){
  const per=+document.getElementById('perTeam').value;
  const needed=per*4;
  if(people.length<needed) return toast(`Faltam ${needed-people.length} pessoa(s)!`,'err');
  const sh=[...people].sort(()=>Math.random()-.5);
  teams.forEach((t,i)=>{ t.members=sh.slice(i*per,(i+1)*per); });
  renderSorteioResult(per);
  document.getElementById('sInfo').textContent='Sorteio realizado! ✓';
}

function renderSorteioResult(per){
  document.getElementById('sResult').innerHTML=`
    <div class="section-title gold-title" style="display:flex;justify-content:space-between;align-items:center">
      <span>Resultado 🎉</span>
      <button class="btn btn-ghost" onclick="copySorteio()" style="font-size:.75rem;min-height:36px">📋 Copiar</button>
    </div>
    <div class="team-grid-4">
      ${teams.map((t,ti)=>`
        <div class="team-result-card" style="border-top:3px solid ${t.color}">
          <div class="trc-header">
            <div class="trc-dot" style="background:${t.color}"></div>
            <div class="trc-name">${t.name}</div>
          </div>
          <div class="trc-body">
            ${t.members.map((m,mi)=>`
              <div class="member-row" style="animation-delay:${(ti*per+mi)*55}ms">
                <span class="mem-num">${mi+1}</span><span>${m}</span>
              </div>`).join('')}
          </div>
        </div>`).join('')}
    </div>`;
}

function clearSorteio(){
  people=[]; teams.forEach(t=>t.members=[]);
  document.getElementById('sResult').innerHTML='';
  document.getElementById('sInfo').textContent='';
  renderNameList();
}

function copySorteio(){
  const lines=[];
  teams.forEach(t=>{
    if(!t.members.length)return;
    lines.push(`🏐 ${t.name}`);
    t.members.forEach((m,i)=>lines.push(`  ${i+1}. ${m}`));
    lines.push('');
  });
  navigator.clipboard.writeText(lines.join('\n'))
    .then(()=>toast('Copiado! ✓'))
    .catch(()=>toast('Erro ao copiar','err'));
}

// ════ TIMES ════
function renderTeams(){
  document.getElementById('teamsGrid').innerHTML=teams.map((t,i)=>`
    <div class="team-card" style="border-top:2px solid ${t.color}25">
      <div class="tc-num">${i+1}</div>
      <div class="tc-label">Time ${i+1}</div>
      <input type="text" id="tn${i}" value="${t.name}" placeholder="Nome...">
      <div class="color-row">
        ${COLORS.map((c,ci)=>`
          <div class="color-dot ${t.color===c?'sel':''}" style="background:${c}"
               title="${CLR[ci]}" onclick="pickColor(${i},'${c}',this)"></div>`).join('')}
      </div>
      ${t.members.length?`
        <div class="tc-members">
          <div class="tc-members-title">Integrantes (${t.members.length})</div>
          ${t.members.map((m,mi)=>`<div class="tc-member-item">${mi+1}. ${m}</div>`).join('')}
        </div>`:''}
    </div>`).join('');
}
function pickColor(i,c,el){
  teams[i].color=c;
  const card=el.closest('.team-card');
  card.style.borderTopColor=c+'25';
  card.querySelectorAll('.color-dot').forEach(d=>d.classList.remove('sel'));
  el.classList.add('sel');
}
function saveTeams(){
  teams.forEach((t,i)=>{ t.name=document.getElementById('tn'+i).value.trim()||'Time '+(i+1); });
  toast('Times salvos! ✓'); renderTeams();
}

// ════ TIMERS ════
function startTimer(key){
  if(timers[key]) return;
  timers[key]={ start:Date.now() };
  timers[key].iv=setInterval(()=>{
    const el=document.getElementById('btimer-'+key);
    if(!el){ clearInterval(timers[key].iv); delete timers[key]; return; }
    const s=Math.floor((Date.now()-timers[key].start)/1000);
    el.textContent=fmtTime(s);
  },1000);
}
function stopTimer(key){
  if(timers[key]){ clearInterval(timers[key].iv); delete timers[key]; }
}
function timerElapsed(key){
  return timers[key] ? Math.floor((Date.now()-timers[key].start)/1000) : 0;
}
function fmtTime(s){
  const m=Math.floor(s/60), sec=s%60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

// SET TIMER — each set tracks its own start
function startSetTimer(key){
  bracket[key].setStart=Date.now();
}
function getSetElapsed(key){
  if(!bracket[key].setStart) return 0;
  return Math.floor((Date.now()-bracket[key].setStart)/1000);
}

// ════ CHAVEAMENTO ════
function randomBracket(){
  bracket.slots=[0,1,2,3].sort(()=>Math.random()-.5);
  bracket.seeded=true;
  bracket.sf1=mkM(); bracket.sf2=mkM(); bracket.final=mkM(); bracket.third=mkM();
  renderBracket(); toast('Chaveamento sorteado! 🎲');
}
function resetBracket(){
  ['sf1','sf2','final','third'].forEach(k=>stopTimer(k));
  bracket={seeded:false,slots:[null,null,null,null],sf1:mkM(),sf2:mkM(),final:mkM(),third:mkM()};
  document.getElementById('statsDiv').innerHTML='';
  renderBracket();
}

function bT(slot){ const i=bracket.slots[slot]; return i!==null?teams[i]:null; }
function sCnt(m){ return [m.sets.filter(s=>s[0]>s[1]).length,m.sets.filter(s=>s[1]>s[0]).length]; }

function bWinTeam(key,tA,tB){
  const m=bracket[key];
  if(m.status!=='done'||m.scoreA===m.scoreB) return null;
  return m.scoreA>m.scoreB?tA:tB;
}
function bLoseTeam(key,tA,tB){
  const m=bracket[key];
  if(m.status!=='done'||m.scoreA===m.scoreB) return null;
  return m.scoreA>m.scoreB?tB:tA;
}

function renderBracket(){
  const v=document.getElementById('bView');
  const cd=document.getElementById('champDiv');
  if(!bracket.seeded){
    v.innerHTML=`<div class="empty"><div class="ei">🏆</div><p>Clique em "Sortear Chaveamento"</p></div>`;
    cd.innerHTML=''; return;
  }
  const [tA1,tB1,tA2,tB2]=[bT(0),bT(1),bT(2),bT(3)];
  const wSF1=bWinTeam('sf1',tA1,tB1), wSF2=bWinTeam('sf2',tA2,tB2);
  const lSF1=bLoseTeam('sf1',tA1,tB1), lSF2=bLoseTeam('sf2',tA2,tB2);
  const wFin=bWinTeam('final',wSF1,wSF2);
  const w3  =bWinTeam('third',lSF1,lSF2);
  const [s1a,s1b]=sCnt(bracket.sf1);
  const [s2a,s2b]=sCnt(bracket.sf2);
  const [fa ,fb ]=sCnt(bracket.final);
  const [t3a,t3b]=sCnt(bracket.third);

  function tRow(t,sc,win,tbd){
    if(tbd||!t) return `<div class="b-team btbd"><div class="b-tdot" style="background:#2a2010"></div><div class="b-tname">A definir</div></div>`;
    return `<div class="b-team ${win?'bwinner':''}">
      <div class="b-tdot" style="background:${t.color}"></div>
      <div class="b-tname">${t.name}</div>
      <div class="b-tscore" style="color:${win?'var(--gold)':sc!==null?'var(--white)':'transparent'}">${sc!==null?sc:'-'}</div>
    </div>`;
  }

  function setChips(key){
    const m=bracket[key];
    if(!m.sets.length) return '';
    return `<div class="b-sets-row">${m.sets.map(s=>`
      <span class="b-set-chip ${s[0]>s[1]?'wa':s[1]>s[0]?'wb':''}">
        ${s[0]}–${s[1]}${s[2]!=null?` <span class="b-set-time">⏱${fmtTime(s[2])}</span>`:''}
      </span>`).join('')}</div>`;
  }

  function bCtrl(key,tA,tB){
    if(!tA||!tB) return '';
    const m=bracket[key];
    if(m.status==='done') return `<div class="b-ctrl-wrap" style="padding:.4rem .6rem;display:flex;justify-content:center">
      <button class="btn btn-ghost" style="min-height:36px;font-size:.72rem" onclick="resetBM('${key}')">↺ Reiniciar</button>
    </div>`;
    if(m.status==='pending') return `<div class="b-ctrl-wrap" style="padding:.4rem .6rem;display:flex;justify-content:center">
      <button class="btn btn-gold" style="min-height:40px;font-size:.8rem;width:100%" onclick="startBM('${key}')">▶ Iniciar</button>
    </div>`;
    return `<div class="b-ctrl-wrap">
      <div class="b-ctrl-top">
        <span class="live-badge"><span class="live-dot"></span>AO VIVO</span>
        <span id="btimer-${key}" class="btimer">00:00</span>
      </div>
      <div class="b-ctrl-main">
        <div class="bsc-group">
          <button class="bsc-btn bsc-minus" onclick="bSc('${key}','A',-1)">−</button>
          <span id="bsc-${key}-A" class="b-live-num score-el" style="color:${tA.color}">${m.scoreA}</span>
          <button class="bsc-btn bsc-plus"  onclick="bSc('${key}','A', 1)">+</button>
        </div>
        <span class="b-vs-sep">:</span>
        <div class="bsc-group">
          <button class="bsc-btn bsc-minus" onclick="bSc('${key}','B',-1)">−</button>
          <span id="bsc-${key}-B" class="b-live-num score-el" style="color:${tB.color}">${m.scoreB}</span>
          <button class="bsc-btn bsc-plus"  onclick="bSc('${key}','B', 1)">+</button>
        </div>
      </div>
      <div style="display:flex;gap:.4rem;padding:.2rem .6rem .45rem;justify-content:center">
        <button class="btn btn-green" style="flex:1;min-height:40px;font-size:.8rem" onclick="bCloseSet('${key}')">✓ Fechar Set</button>
        <button class="btn btn-danger" style="min-height:40px;font-size:.8rem;padding:.5rem .7rem" onclick="finishBM('${key}')">⏹ Fim</button>
      </div>
    </div>`;
  }

  function bBox(key,tA,tB,sA,sB,isFin){
    const m=bracket[key];
    const done=m.status==='done',live=m.status==='live';
    const wA=done&&sA>sB,wB=done&&sB>sA;
    return `<div class="b-match ${isFin?'final-match':''}">
      ${tRow(tA,done||live?sA:null,wA,!tA)}
      ${tRow(tB,done||live?sB:null,wB,!tB)}
      ${setChips(key)}
      ${bCtrl(key,tA,tB)}
    </div>`;
  }

  v.innerHTML=`<div class="bracket">
    <div class="b-round">
      <div class="b-round-title">Semifinais</div>
      <div class="b-col">
        <div><div class="b-group-label">Chave 1</div>${bBox('sf1',tA1,tB1,s1a,s1b,false)}</div>
        <div><div class="b-group-label">Chave 2</div>${bBox('sf2',tA2,tB2,s2a,s2b,false)}</div>
      </div>
    </div>
    <div class="b-conn"><div class="b-conn-t"></div><div class="b-conn-b"></div></div>
    <div class="b-round">
      <div class="b-round-title">Final & 3°</div>
      <div class="b-col">
        <div><div class="b-group-label gold">🏆 Final</div>${bBox('final',wSF1,wSF2,fa,fb,true)}</div>
        <div><div class="b-group-label">🥉 3° Lugar</div>${bBox('third',lSF1,lSF2,t3a,t3b,false)}</div>
      </div>
    </div>
  </div>`;

  // restart live timers after re-render
  ['sf1','sf2','final','third'].forEach(k=>{
    if(bracket[k].status==='live'&&timers[k]) startTimer(k);
  });

  if(wFin){
    cd.innerHTML=`<div class="champion-box">
      <div class="ch-trophy">🏆</div>
      <div class="ch-label">Campeão da Gincana</div>
      <div class="ch-name" style="color:${wFin.color}">${wFin.name}</div>
    </div>`;
  } else { cd.innerHTML=''; }

  renderPodium(wFin,w3,wSF1,wSF2,lSF1,lSF2);
  renderStats(tA1,tB1,tA2,tB2);
}

function startBM(k){
  bracket[k].status='live';
  bracket[k].setStart=Date.now();  // start set timer
  startTimer(k);
  renderBracket();
}

function bSc(k,side,d){
  const m=bracket[k]; if(m.status!=='live') return;
  if(side==='A') m.scoreA=Math.max(0,m.scoreA+d);
  else           m.scoreB=Math.max(0,m.scoreB+d);

  // Atualiza só o número no DOM, sem re-renderizar o bracket inteiro
  const el=document.getElementById('bsc-'+k+'-'+side);
  if(el){
    el.textContent=side==='A'?m.scoreA:m.scoreB;
    el.classList.remove('score-flash');
    void el.offsetWidth;
    el.classList.add('score-flash');
  }
}

function bCloseSet(k){
  const m=bracket[k];
  if(m.scoreA===m.scoreB) return toast('Placar empatado — no vôlei não há empate!','err');
  const dur=getSetElapsed(k);
  m.sets.push([m.scoreA,m.scoreB,dur]);
  m.scoreA=0; m.scoreB=0;
  m.setStart=Date.now();
  renderBracket();
}

function finishBM(k){
  const m=bracket[k];

  // Se há pontos mas está empatado, não salva o set
  if((m.scoreA>0||m.scoreB>0) && m.scoreA===m.scoreB)
    return toast('Placar empatado — no vôlei não há empate!','err');

  // Simula o push sem mutar o estado para validar primeiro
  const tempSets=[...m.sets];
  if(m.scoreA>0||m.scoreB>0) tempSets.push([m.scoreA,m.scoreB,0]);
  const wA=tempSets.filter(s=>s[0]>s[1]).length;
  const wB=tempSets.filter(s=>s[1]>s[0]).length;

  if(wA===0&&wB===0) return toast('Encerre pelo menos um set antes!','err');

  // Só agora muta o estado real
  if(m.scoreA>0||m.scoreB>0){
    const dur=getSetElapsed(k);
    m.sets.push([m.scoreA,m.scoreB,dur]);
  }
  m.scoreA=wA; m.scoreB=wB; m.status='done';
  stopTimer(k); m.setStart=null;
  renderBracket();
}

function resetBM(k){
  stopTimer(k);
  bracket[k]=mkM();
  if(k==='sf1'||k==='sf2'){ bracket.final=mkM(); bracket.third=mkM(); }
  renderBracket();
}

// ════ PÓDIO ════
function renderPodium(p1,p3,wSF1,wSF2,lSF1,lSF2){
  const div=document.getElementById('podiumDiv');
  const p2=p1?(p1===wSF1?wSF2:wSF1):null;
  const p4=p3?(p3===lSF1?lSF2:lSF1):null;
  if(bracket.final.status!=='done'){div.innerHTML='';return;}
  const places=[
    {rank:1,pos:'p1',medal:'🥇',label:'1° Lugar',team:p1},
    {rank:2,pos:'p2',medal:'🥈',label:'2° Lugar',team:p2},
    {rank:3,pos:'p3',medal:'🥉',label:'3° Lugar',team:p3},
    {rank:4,pos:'p4',medal:'4°', label:'4° Lugar',team:p4},
  ];
  const ordered=[places[1],places[0],places[2],places[3]];
  function members(t){
    if(!t||!t.members||!t.members.length)return '';
    return `<div class="podium-members">${t.members.join(' · ')}</div>`;
  }
  div.innerHTML=`<div class="podium-section">
    <div class="podium-title">— Classificação Final —</div>
    <div class="podium-stage">
      ${ordered.map((p,vi)=>`
        <div class="podium-slot ${p.pos}" style="animation-delay:${vi*90}ms">
          ${p.team
            ?`<div class="podium-medal">${p.rank<=3?p.medal:''}</div>
               <div class="podium-dot2" style="background:${p.team.color}"></div>
               <div class="podium-team-name" style="color:${p.team.color}">${p.team.name}</div>`
            :`<div class="podium-medal" style="opacity:.25">${p.medal}</div>
               <div class="podium-team-name" style="color:var(--muted)">—</div>`
          }
          <div class="podium-block">
            <div class="podium-pos">${p.rank<=3?p.rank:p.rank+'°'}</div>
            <div class="podium-pos-label">${p.label}</div>
          </div>
          ${p.team?members(p.team):''}
        </div>`).join('')}
    </div>
  </div>`;
}

// ════ ESTATÍSTICAS ════
function renderStats(tA1,tB1,tA2,tB2){
  const div=document.getElementById('statsDiv'); if(!div)return;
  const wSF1=bWinTeam('sf1',tA1,tB1), wSF2=bWinTeam('sf2',tA2,tB2);
  const lSF1=bLoseTeam('sf1',tA1,tB1), lSF2=bLoseTeam('sf2',tA2,tB2);
  const allM=[
    {key:'sf1',tA:tA1,tB:tB1},
    {key:'sf2',tA:tA2,tB:tB2},
    {key:'final',tA:wSF1,tB:wSF2},
    {key:'third',tA:lSF1,tB:lSF2},
  ];
  const sm=new Map();
  teams.forEach(t=>sm.set(t,{team:t,pts:0,wins:0,losses:0,sW:0,sL:0}));
  allM.forEach(({key,tA,tB})=>{
    const m=bracket[key];
    if(m.status!=='done'||!tA||!tB) return;
    const [wA,wB]=sCnt(m);
    let pA=0,pB=0;
    m.sets.forEach(s=>{ pA+=s[0]; pB+=s[1]; });
    const sA=sm.get(tA), sB=sm.get(tB); if(!sA||!sB)return;
    sA.pts+=pA; sB.pts+=pB;
    sA.sW+=wA; sA.sL+=wB; sB.sW+=wB; sB.sL+=wA;
    if(wA>wB){sA.wins++;sB.losses++;}
    else if(wB>wA){sB.wins++;sA.losses++;}
  });
  const rows=[...sm.values()].sort((a,b)=>b.wins-a.wins||(b.sW-b.sL)-(a.sW-a.sL)||b.pts-a.pts);
  const maxPts=Math.max(...rows.map(r=>r.pts),1);
  const rankC=['r1','r2','r3','r4'];
  div.innerHTML=`<div class="stats-section">
    <div class="stats-title">— Estatísticas —</div>
    <table class="stats-table">
      <thead><tr><th>#</th><th>Time</th><th>V</th><th>D</th><th>Sets</th><th>Pts</th></tr></thead>
      <tbody>${rows.map((r,i)=>`
        <tr>
          <td><span class="rnk ${rankC[i]||'r4'}">${i+1}</span></td>
          <td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${r.team.color};margin-right:4px;vertical-align:middle"></span><strong>${r.team.name}</strong></td>
          <td class="w-c">${r.wins}</td>
          <td class="l-c">${r.losses}</td>
          <td>${r.sW}<span style="color:var(--muted);font-size:.8em">/${r.sW+r.sL}</span></td>
          <td class="pts-c">${r.pts}<span class="stat-bar-wrap"><span class="stat-bar" style="width:${Math.round(r.pts/maxPts*100)}%;background:${r.team.color}"></span></span></td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

// ════ CONFETTI ════
function launchConfetti(){
  const colors=['#FFB800','#fff','#e07b00','#f5f0e8','#ff6060'];
  const canvas=document.createElement('canvas');
  Object.assign(canvas.style,{position:'fixed',top:0,left:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:99999});
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  document.body.appendChild(canvas);
  const ctx=canvas.getContext('2d');
  const pieces=Array.from({length:120},()=>({
    x:Math.random()*canvas.width,y:-20,
    w:Math.random()*9+4,h:Math.random()*5+3,
    color:colors[Math.floor(Math.random()*colors.length)],
    rot:Math.random()*360,rotV:Math.random()*5-2.5,
    vy:Math.random()*3+2,vx:Math.random()*3-1.5,alpha:1
  }));
  let frame=0;
  (function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      p.y+=p.vy; p.x+=p.vx; p.rot+=p.rotV;
      if(frame>80) p.alpha=Math.max(0,p.alpha-.014);
      ctx.save(); ctx.globalAlpha=p.alpha;
      ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    });
    frame++;
    if(frame<150) requestAnimationFrame(draw); else canvas.remove();
  })();
}

// Patch finishBM para confetti já está dentro da renderBracket — fazemos aqui:
const _origFinish=finishBM;
window.finishBM=function(k){
  _origFinish(k);
  // verifica se gerou campeão
  setTimeout(()=>{
    const [tA1,tB1,tA2,tB2]=[bT(0),bT(1),bT(2),bT(3)];
    const wSF1=bWinTeam('sf1',tA1,tB1),wSF2=bWinTeam('sf2',tA2,tB2);
    if(k==='final'&&bWinTeam('final',wSF1,wSF2)) launchConfetti();
  },100);
};

// ════ TOAST ════
function toast(msg,type='ok'){
  const el=document.createElement('div');
  el.textContent=msg;
  Object.assign(el.style,{
    position:'fixed',top:'1rem',left:'50%',transform:'translateX(-50%)',
    zIndex:9999,background:type==='err'?'#c92020':'var(--green)',
    color:'#fff',padding:'.6rem 1.3rem',borderRadius:'8px',
    fontFamily:"'Barlow Condensed',sans-serif",fontWeight:'700',
    fontSize:'.9rem',letterSpacing:'.5px',
    boxShadow:'0 4px 20px rgba(0,0,0,.6)',transition:'opacity .3s',
    whiteSpace:'nowrap',maxWidth:'90vw',textAlign:'center'
  });
  document.body.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),300);},2200);
}

// ─── INIT ───
renderTeams(); renderBracket();
</script>
