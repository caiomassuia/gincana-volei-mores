<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏐 Vôlei Mores</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,900;1,700&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #080705;
  --bg2:     #0f0d0a;
  --card:    #141210;
  --card2:   #1c1a15;
  --gold:    #FFB800;
  --gold2:   #e07b00;
  --white:   #f5f0e8;
  --muted:   #6b6050;
  --border:  #2a2418;
  --red:     #e63030;
  --green:   #18b86a;
  --blue:    #2a7de1;
}
*{ margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Barlow', sans-serif;
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse at 50% 0%, rgba(255,184,0,0.07) 0%, transparent 60%);
}

/* ── HEADER ── */
header {
  text-align: center;
  padding: 2.5rem 1rem 0;
  position: relative;
  overflow: hidden;
}
.header-bg {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,184,0,0.06) 0%, transparent 100%);
  pointer-events: none;
}
.header-slash {
  width: 100%; height: 3px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 1.2rem 0 0;
}
.logo-line {
  display: flex; align-items: center; justify-content: center; gap: 0.8rem;
}
.logo-icon { font-size: 2.4rem; }
h1 {
  font-family: 'Anton', sans-serif;
  font-size: clamp(2.2rem, 8vw, 4.5rem);
  letter-spacing: 3px;
  color: var(--gold);
  text-transform: uppercase;
  text-shadow: 0 0 40px rgba(255,184,0,0.3);
  line-height: 1;
}
.subtitle {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.8rem; letter-spacing: 4px;
  text-transform: uppercase; color: var(--muted);
  margin-top: 0.3rem;
}

/* ── TABS ── */
.container { max-width: 1060px; margin: 0 auto; padding: 0 1rem 4rem; }
.tabs {
  display: flex; overflow-x: auto; gap: 0;
  border-bottom: 2px solid var(--border);
  margin-bottom: 2rem; padding-bottom: 0;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display:none; }
.tab-btn {
  padding: 0.75rem 1rem;
  background: transparent; border: none;
  color: var(--muted);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.85rem; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  transition: all 0.2s; white-space: nowrap;
}
.tab-btn:hover { color: var(--white); }
.tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ── INPUTS ── */
input[type="text"], textarea, select {
  width: 100%;
  background: var(--card2); border: 1px solid var(--border);
  border-radius: 6px; padding: 0.65rem 0.9rem;
  color: var(--white);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1rem; font-weight: 600; letter-spacing: 0.3px;
  outline: none; transition: border-color 0.2s;
}
input[type="text"]:focus, textarea:focus, select:focus {
  border-color: var(--gold);
}
input::placeholder, textarea::placeholder { color: var(--muted); }
textarea { resize: vertical; min-height: 110px; line-height: 1.7; }
select { cursor: pointer; appearance: none; }

/* ── BUTTONS ── */
.btn {
  padding: 0.55rem 1.2rem; border-radius: 5px; border: none;
  cursor: pointer;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.88rem; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  transition: transform 0.1s, opacity 0.15s;
}
.btn:hover { opacity: 0.88; }
.btn:active { transform: scale(0.96); }
.btn-gold   { background: var(--gold); color: #000; }
.btn-danger { background: rgba(230,48,48,0.15); color: #ff6060; border: 1px solid rgba(230,48,48,0.3); }
.btn-ghost  { background: var(--card2); color: var(--muted); border: 1px solid var(--border); }
.btn-green  { background: rgba(24,184,106,0.15); color: var(--green); border: 1px solid rgba(24,184,106,0.3); }
.btn-big    { padding: 0.8rem 2rem; font-size: 1rem; }

.section-title {
  font-family: 'Anton', sans-serif;
  font-size: 1.15rem; letter-spacing: 2px;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 1rem;
}
.gold-title { color: var(--gold); }

/* ── PANEL ── */
.panel {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 1.3rem;
}
.panel-gold { border-top: 3px solid var(--gold); }

/* ════════ SORTEIO ════════ */
.sort-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }
@media(max-width:640px){ .sort-layout { grid-template-columns: 1fr; } }
.name-input-row { display: flex; gap: 0.5rem; margin-bottom: 0.8rem; }
.name-list { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.7rem; min-height: 30px; }
.chip {
  background: var(--card2); border: 1px solid var(--border);
  border-radius: 20px; padding: 0.2rem 0.65rem 0.2rem 0.75rem;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.85rem; font-weight: 600;
  display: flex; align-items: center; gap: 0.4rem;
  animation: popIn 0.2s ease;
}
@keyframes popIn { from{transform:scale(0.6);opacity:0} to{transform:scale(1);opacity:1} }
.rm { cursor: pointer; color: var(--muted); font-size: 0.7rem; }
.rm:hover { color: var(--red); }
.name-count {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.8rem; letter-spacing: 1px; color: var(--muted); margin-top: 0.5rem;
}

/* RESULT */
.team-grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px,1fr)); gap: 1rem; margin-top: 1rem; }
.team-result-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden;
}
.trc-header {
  display: flex; align-items: center; gap: 0.6rem;
  padding: 0.75rem 1rem;
}
.trc-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
.trc-name { font-family: 'Anton', sans-serif; font-size: 1rem; letter-spacing: 1px; text-transform: uppercase; }
.trc-body { padding: 0.3rem 1rem 0.8rem; }
.member-row {
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.38rem 0; border-bottom: 1px solid var(--border);
  font-family: 'Barlow Condensed', sans-serif; font-size: 0.95rem; font-weight: 600;
  animation: slideIn 0.35s ease both;
}
.member-row:last-child { border-bottom: none; }
@keyframes slideIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:none} }
.mem-num { font-family: 'Anton', sans-serif; font-size: 0.75rem; color: var(--muted); min-width: 16px; }

/* ════════ TIMES ════════ */
.teams-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(235px,1fr)); gap: 1rem; margin-bottom: 1.5rem; }
.team-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 1.2rem; position: relative;
  transition: border-color 0.2s;
}
.team-card:hover { border-color: var(--muted); }
.tc-num { font-family:'Anton',sans-serif; font-size:3rem; color:var(--border);
  position:absolute; top:0.5rem; right:0.9rem; line-height:1; user-select:none; }
.tc-label { font-family:'Barlow Condensed',sans-serif; font-size:0.7rem;
  font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:0.5rem; }
.color-row { display:flex; gap:0.4rem; flex-wrap:wrap; margin-top:0.8rem; }
.color-dot { width:25px; height:25px; border-radius:50%; cursor:pointer;
  border:2px solid transparent; transition:transform 0.15s, border-color 0.15s; flex-shrink:0; }
.color-dot:hover { transform:scale(1.2); }
.color-dot.sel { border-color:#fff; transform:scale(1.15); }
.tc-members { margin-top:0.9rem; padding-top:0.9rem; border-top:1px solid var(--border); }
.tc-members-title { font-family:'Barlow Condensed',sans-serif; font-size:0.68rem;
  letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:0.5rem; }
.tc-member-item { font-family:'Barlow Condensed',sans-serif; font-size:0.9rem;
  padding:0.2rem 0; color:var(--white); opacity:0.85; }

/* ════════ CHAVEAMENTO ════════ */
.bracket-wrap { overflow-x:auto; padding-bottom:1rem; }
.bracket { display:flex; align-items:stretch; min-width:560px; }
.b-round { display:flex; flex-direction:column; flex:1; padding:0 0.5rem; }
.b-round-title { font-family:'Barlow Condensed',sans-serif; font-size:0.68rem;
  font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted);
  text-align:center; margin-bottom:1rem; }
.b-col { display:flex; flex-direction:column; gap:1.4rem; flex:1; }
.b-group-label { font-family:'Barlow Condensed',sans-serif; font-size:0.62rem;
  letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); margin-bottom:0.35rem; }
.b-group-label.gold { color:var(--gold); }

.b-match { background:var(--card); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.b-match.final-match { border-color:rgba(255,184,0,0.4); box-shadow:0 0 20px rgba(255,184,0,0.1); }
.b-team { display:flex; align-items:center; padding:0.52rem 0.8rem;
  font-family:'Barlow Condensed',sans-serif; font-size:0.92rem; font-weight:700; gap:0.5rem; }
.b-team + .b-team { border-top:1px solid var(--border); }
.b-tdot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.b-tname { flex:1; }
.b-tscore { font-family:'Anton',sans-serif; font-size:1.15rem; min-width:22px; text-align:right; }
.b-team.bwinner { background:rgba(255,184,0,0.07); }
.b-team.bwinner .b-tname { color:var(--gold); }
.b-team.btbd .b-tname { color:var(--muted); font-style:italic; font-weight:400; }

.b-ctrl { display:flex; gap:0.3rem; justify-content:center; align-items:center;
  padding:0.38rem 0.6rem; flex-wrap:wrap; border-top:1px solid var(--border);
  background:var(--card2); }

/* score mini buttons */
.smbtn { width:28px; height:28px; border-radius:5px; border:none; cursor:pointer;
  font-size:1rem; font-weight:700; font-family:'Barlow Condensed',sans-serif;
  display:inline-flex; align-items:center; justify-content:center;
  transition:transform 0.1s; }
.smbtn:hover { transform:scale(1.1); }
.smbtn:active { transform:scale(0.93); }
.sm-plus { background:var(--gold); color:#000; }
.sm-minus { background:var(--card); color:var(--muted); border:1px solid var(--border); }

/* connector */
.b-conn { display:flex; flex-direction:column; justify-content:space-around; width:22px; align-self:stretch; }
.b-conn-t { flex:1; border-right:2px solid var(--border); border-bottom:2px solid var(--border); border-radius:0 0 4px 0; }
.b-conn-b { flex:1; border-right:2px solid var(--border); border-top:2px solid var(--border); border-radius:0 4px 0 0; }

/* champion */
.champion-box {
  text-align:center; padding:2rem 1rem;
  background:linear-gradient(135deg,rgba(255,184,0,0.1),rgba(224,123,0,0.06));
  border:1px solid rgba(255,184,0,0.25); border-radius:12px; margin-top:1.5rem;
}
.ch-trophy { font-size:3.5rem; }
.ch-label { font-family:'Barlow Condensed',sans-serif; font-size:0.75rem;
  font-weight:700; letter-spacing:4px; text-transform:uppercase; color:var(--muted); margin-top:0.4rem; }
.ch-name { font-family:'Anton',sans-serif; font-size:2.8rem; letter-spacing:2px; margin-top:0.2rem; }
.ch-third { font-family:'Barlow Condensed',sans-serif; font-size:0.9rem; color:var(--muted); margin-top:0.8rem; }

/* ════════ PARTIDAS ════════ */
.match-create { background:var(--card); border:1px dashed var(--border);
  border-radius:10px; padding:1.3rem; margin-bottom:1.5rem; }
.mc-row { display:grid; grid-template-columns:1fr auto 1fr; gap:1rem; align-items:center; margin-bottom:0.9rem; }
.vs-label { font-family:'Anton',sans-serif; font-size:1.2rem; color:var(--muted); text-align:center; }

.match-card { background:var(--card); border:1px solid var(--border);
  border-radius:10px; padding:1.2rem 1.3rem; margin-bottom:1rem; transition:border-color 0.2s; }
.match-card.mlive { border-color:var(--gold); }
.match-card.mdone { opacity:0.6; }
.mh { display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; }
.mh-label { font-family:'Barlow Condensed',sans-serif; font-size:0.7rem;
  font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); }
.mh-badge { font-family:'Barlow Condensed',sans-serif; font-size:0.7rem;
  font-weight:700; letter-spacing:1px; text-transform:uppercase;
  padding:0.18rem 0.65rem; border-radius:20px; background:var(--card2); color:var(--muted); }
.mh-badge.live { background:rgba(230,48,48,0.2); color:#ff6060; animation:pulse 1.5s infinite; }
.mh-badge.done { background:rgba(24,184,106,0.15); color:var(--green); }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.5} }

.scoreboard { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:0.8rem; }
.t-side { text-align:center; }
.t-name { font-family:'Barlow Condensed',sans-serif; font-size:1rem; font-weight:700;
  text-transform:uppercase; letter-spacing:0.4px; margin-bottom:0.35rem;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tbadge { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:4px; vertical-align:middle; }
.big-score { font-family:'Anton',sans-serif; font-size:3.2rem; line-height:1; margin-bottom:0.5rem; }
.sc-btns { display:flex; gap:0.35rem; justify-content:center; }
.scbtn { width:34px; height:34px; border-radius:6px; border:none; cursor:pointer;
  font-size:1.1rem; font-weight:700; display:flex; align-items:center; justify-content:center;
  transition:transform 0.1s; }
.scbtn:hover { transform:scale(1.08); }
.scbtn:active { transform:scale(0.94); }
.scbtn-p { background:var(--gold); color:#000; }
.scbtn-m { background:var(--card2); color:var(--muted); border:1px solid var(--border); }
.mid-div { font-family:'Anton',sans-serif; font-size:1rem; color:var(--muted); }

.sets-ctrl { margin-top:0.8rem; padding-top:0.8rem; border-top:1px solid var(--border); }
.sets-ctrl-title { font-family:'Barlow Condensed',sans-serif; font-size:0.65rem;
  font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:0.5rem; text-align:center; }
.set-chip { font-size:0.68rem; font-family:'Barlow Condensed',sans-serif; font-weight:700;
  background:var(--card2); border:1px solid var(--border); border-radius:4px; padding:0.1rem 0.4rem; color:var(--muted); }
.sets-row { display:flex; gap:0.25rem; justify-content:center; flex-wrap:wrap; margin-top:0.25rem; min-height:18px; }

.win-banner { text-align:center; padding:0.45rem; background:rgba(255,184,0,0.1);
  border-radius:6px; font-family:'Barlow Condensed',sans-serif; font-size:0.82rem;
  font-weight:700; color:var(--gold); letter-spacing:1px; margin-top:0.4rem; text-transform:uppercase; }
.m-actions { display:flex; gap:0.4rem; justify-content:center; flex-wrap:wrap;
  margin-top:0.9rem; padding-top:0.9rem; border-top:1px solid var(--border); }

/* ════════ CLASSIFICAÇÃO ════════ */
.stand-table { width:100%; border-collapse:collapse; background:var(--card); border-radius:10px; overflow:hidden; }
.stand-table th { background:var(--card2); padding:0.75rem 0.9rem;
  font-family:'Barlow Condensed',sans-serif; font-size:0.68rem; font-weight:700;
  letter-spacing:2px; text-transform:uppercase; color:var(--muted); text-align:center; }
.stand-table th:first-child { text-align:left; }
.stand-table td { padding:0.85rem 0.9rem; border-top:1px solid var(--border);
  text-align:center; font-family:'Barlow Condensed',sans-serif; font-size:0.95rem; font-weight:600; }
.stand-table td:first-child { text-align:left; }
.stand-table tr:hover td { background:var(--card2); }
.rnk { display:inline-flex; align-items:center; justify-content:center;
  width:22px; height:22px; border-radius:5px; font-family:'Anton',sans-serif;
  font-size:0.85rem; margin-right:0.4rem; }
.r1 { background:linear-gradient(135deg,#FFB800,#e07b00); color:#000; }
.r2 { background:#2a2418; color:#8a7050; }
.r3 { background:#1a1510; color:#5a4830; }
.r4 { background:var(--card2); color:var(--muted); }
.pts-c { color:var(--gold); font-size:1.1rem; font-family:'Anton',sans-serif; }
.w-c { color:var(--green); }
.l-c { color:#f87171; }

/* EMPTY */
.empty { text-align:center; padding:2.5rem 1rem; color:var(--muted); }
.empty .ei { font-size:2.5rem; margin-bottom:0.6rem; }
.empty p { font-family:'Barlow Condensed',sans-serif; font-size:1rem; letter-spacing:1px; }

/* PODIUM */
.podium-section {
  margin-top: 2.5rem;
  padding-top: 2rem;
  border-top: 1px solid var(--border);
}
.podium-title {
  font-family: 'Anton', sans-serif;
  font-size: 1.1rem; letter-spacing: 3px;
  text-transform: uppercase; color: var(--muted);
  text-align: center; margin-bottom: 2rem;
}
.podium-stage {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 0.6rem;
  margin-bottom: 1.5rem;
}
.podium-slot {
  display: flex; flex-direction: column; align-items: center;
  flex: 1; max-width: 200px;
}
.podium-team-name {
  font-family: 'Anton', sans-serif;
  font-size: 1rem; letter-spacing: 1px;
  text-transform: uppercase; text-align: center;
  margin-bottom: 0.5rem; line-height: 1.2;
}
.podium-medal { font-size: 2rem; margin-bottom: 0.3rem; }
.podium-block {
  width: 100%; border-radius: 6px 6px 0 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start;
  padding-top: 0.9rem;
  position: relative;
}
.podium-pos {
  font-family: 'Anton', sans-serif;
  font-size: 2.8rem; letter-spacing: 1px; line-height: 1;
}
.podium-pos-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.65rem; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  margin-top: 0.2rem; opacity: 0.7;
}
.p1 .podium-block { height: 160px; background: linear-gradient(180deg,rgba(255,184,0,0.25),rgba(255,184,0,0.08)); border:1px solid rgba(255,184,0,0.35); }
.p1 .podium-pos   { color: var(--gold); text-shadow: 0 0 20px rgba(255,184,0,0.5); }
.p2 .podium-block { height: 120px; background: linear-gradient(180deg,rgba(180,180,190,0.15),rgba(180,180,190,0.04)); border:1px solid rgba(180,180,190,0.2); }
.p2 .podium-pos   { color: #b0b8c8; }
.p3 .podium-block { height: 90px;  background: linear-gradient(180deg,rgba(180,100,40,0.18),rgba(180,100,40,0.04)); border:1px solid rgba(180,100,40,0.25); }
.p3 .podium-pos   { color: #c87840; }
.p4 .podium-block { height: 65px;  background: linear-gradient(180deg,rgba(80,80,80,0.15),rgba(80,80,80,0.04)); border:1px solid rgba(80,80,80,0.2); }
.p4 .podium-pos   { color: var(--muted); font-size: 2rem; }
.podium-dot { width: 14px; height: 14px; border-radius: 50%; margin-bottom: 0.4rem; flex-shrink: 0; }
.podium-members {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.78rem; color: var(--muted);
  text-align: center; margin-top: 0.3rem; line-height: 1.6;
}
@keyframes riseUp {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}
.podium-slot { animation: riseUp 0.5s ease both; }

@media(max-width:600px){
  .big-score { font-size:2.4rem; }
  .mc-row { grid-template-columns:1fr; }
  .vs-label { display:none; }
  .bracket { min-width:480px; }
}
</style>
</head>
<body>

<header>
  <div class="header-bg"></div>
  <div class="logo-line">
    <span class="logo-icon">🏐</span>
    <h1>Vôlei Mores</h1>
    <span class="logo-icon">🦁</span>
  </div>
  <p class="subtitle">Gincana · Chaveamento · Sorteio</p>
  <div class="header-slash"></div>
</header>

<div class="container" style="padding-top:1.8rem">
  <nav class="tabs">
    <button class="tab-btn active" onclick="goTab('sorteio',this)">🎲 Sorteio</button>
    <button class="tab-btn"        onclick="goTab('times',this)">🏅 Times</button>
    <button class="tab-btn"        onclick="goTab('chaveamento',this)">🏆 Chaveamento</button>
  </nav>

  <!-- ══ SORTEIO ══ -->
  <div id="tab-sorteio" class="tab-content active">
    <div class="sort-layout">
      <div class="panel panel-gold">
        <div class="section-title gold-title">Adicionar Pessoas</div>
        <div class="name-input-row">
          <input type="text" id="nameIn" placeholder="Nome da pessoa..."
                 onkeydown="if(event.key==='Enter')addName()">
          <button class="btn btn-gold" onclick="addName()" style="white-space:nowrap;flex-shrink:0">+ Add</button>
        </div>
        <textarea id="bulkIn" placeholder="Ou cole vários nomes (um por linha)..."></textarea>
        <button class="btn btn-ghost" onclick="addBulk()" style="margin-top:0.5rem;width:100%">Adicionar em massa ↑</button>
        <div class="name-count" id="nameCount" style="margin-top:0.65rem">0 pessoas adicionadas</div>
        <div class="name-list" id="nameList"></div>
      </div>

      <div class="panel">
        <div class="section-title gold-title">Sortear Times</div>
        <label style="font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;
          letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:0.4rem">
          Pessoas por time
        </label>
        <select id="perTeam" onchange="updateCount()" style="margin-bottom:1.2rem">
          <option value="4">4 por time (16 total)</option>
          <option value="5">5 por time (20 total)</option>
          <option value="6" selected>6 por time (24 total)</option>
          <option value="7">7 por time (28 total)</option>
          <option value="8">8 por time (32 total)</option>
        </select>
        <button class="btn btn-gold btn-big" onclick="doSorteio()" style="width:100%;margin-bottom:0.6rem">
          🎲 Sortear Times!
        </button>
        <button class="btn btn-danger" onclick="clearSorteio()" style="width:100%">✕ Limpar Tudo</button>
        <div id="sInfo" style="margin-top:0.8rem;font-family:'Barlow Condensed',sans-serif;
          font-size:0.82rem;color:var(--muted);text-align:center;letter-spacing:1px"></div>
      </div>
    </div>
    <div id="sResult" style="margin-top:1.5rem"></div>
  </div>

  <!-- ══ TIMES ══ -->
  <div id="tab-times" class="tab-content">
    <div class="teams-grid" id="teamsGrid"></div>
    <div style="text-align:center">
      <button class="btn btn-gold btn-big" onclick="saveTeams()">✓ Salvar Times</button>
    </div>
  </div>

  <!-- ══ CHAVEAMENTO ══ -->
  <div id="tab-chaveamento" class="tab-content">
    <div style="display:flex;gap:0.8rem;flex-wrap:wrap;margin-bottom:1.5rem;align-items:center">
      <button class="btn btn-gold btn-big" onclick="randomBracket()">🎲 Sortear Chaveamento</button>
      <button class="btn btn-ghost"        onclick="resetBracket()">↺ Reiniciar</button>
    </div>
    <div class="bracket-wrap"><div id="bView"></div></div>
    <div id="champDiv"></div>
    <div id="podiumDiv"></div>
  </div>
</div>

<script>
// ═══════════════════ STATE ═══════════════════
const COLORS   = ['#FFB800','#ef4444','#3b82f6','#10b981','#a855f7','#ec4899','#f97316','#06b6d4'];
const CLR_NAME = ['Ouro','Vermelho','Azul','Verde','Roxo','Rosa','Laranja','Ciano'];

let teams = [
  { name:'Time 1', color:COLORS[0], members:[] },
  { name:'Time 2', color:COLORS[1], members:[] },
  { name:'Time 3', color:COLORS[2], members:[] },
  { name:'Time 4', color:COLORS[3], members:[] },
];

let people  = [];
let matches = [];
let midx    = 0;

function mkM(){ return { scoreA:0, scoreB:0, sets:[], status:'pending' }; }
let bracket = {
  seeded:false, slots:[null,null,null,null],
  sf1:mkM(), sf2:mkM(), final:mkM(), third:mkM()
};

// ═══════════════════ TABS ═══════════════════
function goTab(id, btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='times')       renderTeams();
  if(id==='chaveamento') renderBracket();
}

// ═══════════════════ SORTEIO ═══════════════════
function addName(){
  const el=document.getElementById('nameIn');
  const n=el.value.trim(); if(!n)return;
  people.push(n); el.value=''; el.focus(); renderNameList();
}
function addBulk(){
  const v=document.getElementById('bulkIn').value.trim(); if(!v)return;
  v.split('\n').map(s=>s.trim()).filter(Boolean).forEach(n=>people.push(n));
  document.getElementById('bulkIn').value=''; renderNameList();
}
function removePerson(i){ people.splice(i,1); renderNameList(); }
function updateCount(){ renderNameList(); }

function renderNameList(){
  const per   = +document.getElementById('perTeam').value||6;
  const needed= per*4;
  const diff  = needed-people.length;
  document.getElementById('nameList').innerHTML=people.map((p,i)=>`
    <div class="chip">
      <span>${p}</span>
      <span class="rm" onclick="removePerson(${i})">✕</span>
    </div>`).join('');
  const cnt=document.getElementById('nameCount');
  if(diff<=0){ cnt.textContent=`${people.length} pessoas · ✓ pronto para sortear!`; cnt.style.color='var(--green)'; }
  else        { cnt.textContent=`${people.length} / ${needed} pessoas (faltam ${diff})`; cnt.style.color='var(--muted)'; }
}

function doSorteio(){
  const per   = +document.getElementById('perTeam').value;
  const needed= per*4;
  if(people.length<needed) return toast(`Faltam ${needed-people.length} pessoa(s)!`,'err');
  const sh=[...people].sort(()=>Math.random()-0.5);
  teams.forEach((t,i)=>{ t.members=sh.slice(i*per,(i+1)*per); });
  renderSorteioResult();
  document.getElementById('sInfo').textContent='Sorteio realizado! ✓';
  // auto-refresh teams tab if visible
}

function renderSorteioResult(){
  const per=+document.getElementById('perTeam').value;
  document.getElementById('sResult').innerHTML=`
    <div class="section-title gold-title">Resultado do Sorteio 🎉</div>
    <div class="team-grid-4">
      ${teams.map((t,ti)=>`
        <div class="team-result-card" style="border-top:3px solid ${t.color}">
          <div class="trc-header">
            <div class="trc-dot" style="background:${t.color}"></div>
            <div class="trc-name">${t.name}</div>
          </div>
          <div class="trc-body">
            ${t.members.map((m,mi)=>`
              <div class="member-row" style="animation-delay:${(ti*per+mi)*60}ms">
                <span class="mem-num">${mi+1}</span>
                <span>${m}</span>
              </div>`).join('')}
          </div>
        </div>`).join('')}
    </div>`;
}

function clearSorteio(){
  people=[]; teams.forEach(t=>t.members=[]);
  document.getElementById('sResult').innerHTML='';
  document.getElementById('sInfo').textContent='';
  renderNameList();
}

// ═══════════════════ TIMES ═══════════════════
function renderTeams(){
  document.getElementById('teamsGrid').innerHTML=teams.map((t,i)=>`
    <div class="team-card" style="border-top:2px solid ${t.color}30">
      <div class="tc-num">${i+1}</div>
      <div class="tc-label">Time ${i+1}</div>
      <input type="text" id="tn${i}" value="${t.name}" placeholder="Nome do time">
      <div class="color-row">
        ${COLORS.map((c,ci)=>`
          <div class="color-dot ${t.color===c?'sel':''}" style="background:${c}"
               title="${CLR_NAME[ci]}" onclick="pickColor(${i},'${c}',this)"></div>
        `).join('')}
      </div>
      ${t.members.length?`
        <div class="tc-members">
          <div class="tc-members-title">Integrantes (${t.members.length})</div>
          ${t.members.map((m,mi)=>`<div class="tc-member-item">${mi+1}. ${m}</div>`).join('')}
        </div>`:''}
    </div>`).join('');
}
function pickColor(i,c,el){
  teams[i].color=c;
  el.closest('.team-card').querySelectorAll('.color-dot').forEach(d=>d.classList.remove('sel'));
  el.classList.add('sel');
}
function saveTeams(){
  teams.forEach((t,i)=>{ t.name=document.getElementById('tn'+i).value.trim()||'Time '+(i+1); });
  toast('Times salvos! ✓'); renderTeams();
}

// ═══════════════════ CHAVEAMENTO ═══════════════════
function randomBracket(){
  bracket.slots=[0,1,2,3].sort(()=>Math.random()-0.5);
  bracket.seeded=true;
  bracket.sf1=mkM(); bracket.sf2=mkM(); bracket.final=mkM(); bracket.third=mkM();
  renderBracket(); toast('Chaveamento sorteado! 🎲');
}
function resetBracket(){
  bracket={seeded:false,slots:[null,null,null,null],sf1:mkM(),sf2:mkM(),final:mkM(),third:mkM()};
  renderBracket();
}

function bT(slot){ const i=bracket.slots[slot]; return i!==null?teams[i]:null; }
function sCnt(m){ return [m.sets.filter(s=>s[0]>s[1]).length, m.sets.filter(s=>s[1]>s[0]).length]; }

// Recebe os objetos de time diretamente, não slots
function bWinTeam(key, teamA, teamB){
  const m=bracket[key];
  if(m.status!=='done') return null;
  if(m.scoreA===m.scoreB) return null;
  return m.scoreA>m.scoreB ? teamA : teamB;
}
function bLoseTeam(key, teamA, teamB){
  const m=bracket[key];
  if(m.status!=='done') return null;
  if(m.scoreA===m.scoreB) return null;
  return m.scoreA>m.scoreB ? teamB : teamA;
}

function renderBracket(){
  const v=document.getElementById('bView');
  const cd=document.getElementById('champDiv');
  if(!bracket.seeded){
    v.innerHTML=`<div class="empty"><div class="ei">🏆</div><p>Clique em "Sortear Chaveamento" para começar</p></div>`;
    cd.innerHTML=''; return;
  }

  const [tA1,tB1,tA2,tB2]=[bT(0),bT(1),bT(2),bT(3)];
  // Passa os times reais que jogam cada partida
  const wSF1=bWinTeam('sf1', tA1, tB1);
  const wSF2=bWinTeam('sf2', tA2, tB2);
  const lSF1=bLoseTeam('sf1', tA1, tB1);
  const lSF2=bLoseTeam('sf2', tA2, tB2);
  const wFin=bWinTeam('final', wSF1, wSF2);
  const w3  =bWinTeam('third', lSF1, lSF2);

  const [s1a,s1b]=sCnt(bracket.sf1);
  const [s2a,s2b]=sCnt(bracket.sf2);
  const [fa ,fb ]=sCnt(bracket.final);
  const [t3a,t3b]=sCnt(bracket.third);

  function tRow(t,sc,win,tbd){
    if(tbd||!t) return `<div class="b-team btbd"><div class="b-tdot" style="background:#2a2010"></div><div class="b-tname">A definir</div></div>`;
    return `<div class="b-team ${win?'bwinner':''}">
      <div class="b-tdot" style="background:${t.color}"></div>
      <div class="b-tname">${t.name}</div>
      <div class="b-tscore" style="color:${win?'var(--gold)':sc!==null?'var(--white)':'transparent'}">${sc!==null?sc:'-'}</div>
    </div>`;
  }

  function bCtrl(key, tA, tB){
    if(!tA||!tB) return '';
    const m=bracket[key];
    if(m.status==='done') return `<div class="b-ctrl">
      <button class="btn btn-ghost" style="padding:0.18rem 0.6rem;font-size:0.68rem" onclick="resetBM('${key}')">↺ Reiniciar</button>
    </div>`;
    if(m.status==='pending') return `<div class="b-ctrl">
      <button class="btn btn-gold" style="padding:0.28rem 0.8rem;font-size:0.75rem" onclick="startBM('${key}')">▶ Iniciar</button>
    </div>`;
    return `<div class="b-ctrl">
      <button class="smbtn sm-minus" onclick="bSc('${key}','A',-1)">−</button>
      <button class="smbtn sm-plus"  onclick="bSc('${key}','A', 1)">+</button>
      <span style="font-family:'Anton',sans-serif;font-size:1.1rem;color:${tA.color};min-width:20px;text-align:center">${m.scoreA}</span>
      <span style="font-family:'Anton',sans-serif;font-size:0.9rem;color:var(--muted)">:</span>
      <span style="font-family:'Anton',sans-serif;font-size:1.1rem;color:${tB.color};min-width:20px;text-align:center">${m.scoreB}</span>
      <button class="smbtn sm-minus" onclick="bSc('${key}','B',-1)">−</button>
      <button class="smbtn sm-plus"  onclick="bSc('${key}','B', 1)">+</button>
      <button class="btn btn-green"  style="padding:0.2rem 0.5rem;font-size:0.68rem" onclick="bCloseSet('${key}')">Set ✓</button>
      <button class="btn btn-danger" style="padding:0.2rem 0.5rem;font-size:0.68rem" onclick="finishBM('${key}')">Fim</button>
    </div>`;
  }

  function bBox(key, tA, tB, sA, sB, isFin){
    const m=bracket[key];
    const done=m.status==='done', live=m.status==='live';
    const show=done||live;
    const wA=done&&sA>sB, wB=done&&sB>sA;
    return `<div class="b-match ${isFin?'final-match':''}">
      ${tRow(tA, show?sA:null, wA, !tA)}
      ${tRow(tB, show?sB:null, wB, !tB)}
      ${bCtrl(key, tA, tB)}
    </div>`;
  }

  v.innerHTML=`<div class="bracket">
    <div class="b-round">
      <div class="b-round-title">Semifinais</div>
      <div class="b-col">
        <div>
          <div class="b-group-label">Chave 1</div>
          ${bBox('sf1',tA1,tB1,s1a,s1b,false)}
        </div>
        <div>
          <div class="b-group-label">Chave 2</div>
          ${bBox('sf2',tA2,tB2,s2a,s2b,false)}
        </div>
      </div>
    </div>
    <div class="b-conn"><div class="b-conn-t"></div><div class="b-conn-b"></div></div>
    <div class="b-round">
      <div class="b-round-title">Final & 3° Lugar</div>
      <div class="b-col">
        <div>
          <div class="b-group-label gold">🏆 Final</div>
          ${bBox('final',wSF1,wSF2,fa,fb,true)}
        </div>
        <div>
          <div class="b-group-label">🥉 3° Lugar</div>
          ${bBox('third',lSF1,lSF2,t3a,t3b,false)}
        </div>
      </div>
    </div>
  </div>`;

  if(wFin){
    cd.innerHTML=`<div class="champion-box">
      <div class="ch-trophy">🏆</div>
      <div class="ch-label">Campeão da Gincana</div>
      <div class="ch-name" style="color:${wFin.color}">${wFin.name}</div>
      ${w3?`<div class="ch-third">🥉 3° lugar: <strong style="color:var(--white)">${w3.name}</strong></div>`:''}
    </div>`;
  } else { cd.innerHTML=''; }

  renderPodium(wFin, w3, wSF1, wSF2, lSF1, lSF2);
}

function startBM(k){ bracket[k].status='live'; renderBracket(); }
function bSc(k,side,d){
  const m=bracket[k]; if(m.status!=='live')return;
  if(side==='A') m.scoreA=Math.max(0,m.scoreA+d);
  else           m.scoreB=Math.max(0,m.scoreB+d);
  renderBracket();
}
function bCloseSet(k){
  const m=bracket[k];
  m.sets.push([m.scoreA,m.scoreB]); m.scoreA=0; m.scoreB=0; renderBracket();
}
function finishBM(k){
  const m=bracket[k];
  if(m.scoreA>0||m.scoreB>0) m.sets.push([m.scoreA,m.scoreB]);
  const [wA,wB]=sCnt(m);
  if(wA===0&&wB===0) return toast('Encerre pelo menos um set antes!','err');
  m.scoreA=wA; m.scoreB=wB; m.status='done'; renderBracket();
}
function resetBM(k){
  bracket[k]=mkM();
  if(k==='sf1'||k==='sf2'){ bracket.final=mkM(); bracket.third=mkM(); }
  renderBracket();
}

// ═══════════════════ PARTIDAS ═══════════════════
function renderSelects(){
  ['sTA','sTB'].forEach(id=>{
    const s=document.getElementById(id);
    s.innerHTML='<option value="">— Escolher —</option>'+
      teams.map((t,i)=>`<option value="${i}">${t.name}</option>`).join('');
  });
}
function addMatch(){
  const ai=+document.getElementById('sTA').value;
  const bi=+document.getElementById('sTB').value;
  const lb=document.getElementById('mLabel').value.trim()||'Partida';
  if(isNaN(ai)||isNaN(bi)||document.getElementById('sTA').value==='')
    return toast('Selecione os dois times!','err');
  if(ai===bi) return toast('Escolha times diferentes!','err');
  matches.push({id:++midx,label:lb,tA:ai,tB:bi,scoreA:0,scoreB:0,sets:[],status:'pending'});
  document.getElementById('mLabel').value=''; renderMatches();
}
function renderMatches(){
  const c=document.getElementById('mList');
  if(!matches.length){c.innerHTML=`<div class="empty"><div class="ei">🏐</div><p>Nenhuma partida criada ainda</p></div>`;return;}
  c.innerHTML=matches.map(mCard).join('');
}
function mCard(m){
  const tA=teams[m.tA], tB=teams[m.tB];
  const nA=tA?tA.name:'?', nB=tB?tB.name:'?';
  const cA=tA?tA.color:'#888', cB=tB?tB.color:'#888';
  const sl=m.status==='live'?'AO VIVO':m.status==='done'?'ENCERRADA':'AGUARDANDO';
  const sc=m.status==='live'?'live':m.status==='done'?'done':'';
  const cc=m.status==='live'?'mlive':m.status==='done'?'mdone':'';
  const wA=m.sets.filter(s=>s[0]>s[1]).length, wB=m.sets.filter(s=>s[1]>s[0]).length;
  const sh=m.sets.map(s=>`<span class="set-chip">${s[0]}–${s[1]}</span>`).join('');

  let win='';
  if(m.status==='done'){
    if(m.scoreA>m.scoreB)      win=`<div class="win-banner">🏆 Vencedor: ${nA}</div>`;
    else if(m.scoreB>m.scoreA) win=`<div class="win-banner">🏆 Vencedor: ${nB}</div>`;
    else                        win=`<div class="win-banner">🤝 Empate</div>`;
  }

  const live=m.status!=='done'?`
    <div class="sets-ctrl">
      <div class="sets-ctrl-title">Pontos deste set</div>
      <div class="scoreboard">
        <div class="t-side">
          <div class="big-score" style="color:${cA}">${m.scoreA}</div>
          <div class="sc-btns">
            <button class="scbtn scbtn-p" onclick="chSc(${m.id},'A', 1)">+</button>
            <button class="scbtn scbtn-m" onclick="chSc(${m.id},'A',-1)">−</button>
          </div>
        </div>
        <div class="mid-div">:</div>
        <div class="t-side">
          <div class="big-score" style="color:${cB}">${m.scoreB}</div>
          <div class="sc-btns">
            <button class="scbtn scbtn-p" onclick="chSc(${m.id},'B', 1)">+</button>
            <button class="scbtn scbtn-m" onclick="chSc(${m.id},'B',-1)">−</button>
          </div>
        </div>
      </div>
    </div>`:'';

  return `<div class="match-card ${cc}">
    <div class="mh">
      <span class="mh-label">${m.label}</span>
      <span class="mh-badge ${sc}">${sl}</span>
    </div>
    <div class="scoreboard" style="margin-bottom:0.4rem">
      <div class="t-side">
        <div class="t-name"><span class="tbadge" style="background:${cA}"></span>${nA}</div>
        <div style="font-family:'Anton',sans-serif;font-size:2rem;color:${cA}">${wA}</div>
        <div class="sets-row">${sh}</div>
      </div>
      <div class="mid-div">SETS</div>
      <div class="t-side">
        <div class="t-name"><span class="tbadge" style="background:${cB}"></span>${nB}</div>
        <div style="font-family:'Anton',sans-serif;font-size:2rem;color:${cB}">${wB}</div>
      </div>
    </div>
    ${live}${win}
    <div class="m-actions">
      ${m.status==='pending'?`<button class="btn btn-gold"    onclick="stM(${m.id})">▶ Iniciar</button>`:''}
      ${m.status==='live'   ?`<button class="btn btn-green"   onclick="svS(${m.id})">✓ Fechar Set</button>`:''}
      ${m.status==='live'   ?`<button class="btn btn-danger"  onclick="fnM(${m.id})">⏹ Encerrar</button>`:''}
      ${m.status==='done'   ?`<button class="btn btn-ghost"   onclick="rsM(${m.id})">↺ Reiniciar</button>`:''}
      <button class="btn btn-danger" onclick="dlM(${m.id})">🗑</button>
    </div>
  </div>`;
}

function stM(id){ const m=matches.find(x=>x.id===id); if(m) m.status='live'; renderMatches(); }
function chSc(id,s,d){
  const m=matches.find(x=>x.id===id); if(!m||m.status!=='live')return;
  if(s==='A') m.scoreA=Math.max(0,m.scoreA+d);
  else        m.scoreB=Math.max(0,m.scoreB+d);
  renderMatches();
}
function svS(id){
  const m=matches.find(x=>x.id===id); if(!m)return;
  m.sets.push([m.scoreA,m.scoreB]); m.scoreA=0; m.scoreB=0; renderMatches();
}
function fnM(id){
  const m=matches.find(x=>x.id===id); if(!m)return;
  if(m.scoreA>0||m.scoreB>0) m.sets.push([m.scoreA,m.scoreB]);
  const wA=m.sets.filter(s=>s[0]>s[1]).length;
  const wB=m.sets.filter(s=>s[1]>s[0]).length;
  if(wA===0&&wB===0) return toast('Encerre pelo menos um set antes!','err');
  m.scoreA=wA; m.scoreB=wB; m.status='done';
  renderMatches();
}
function rsM(id){
  const m=matches.find(x=>x.id===id); if(!m)return;
  m.scoreA=0; m.scoreB=0; m.sets=[]; m.status='pending'; renderMatches();
}
function dlM(id){ matches=matches.filter(x=>x.id!==id); renderMatches(); }

// ═══════════════════ TOAST ═══════════════════
function toast(msg,type='ok'){
  const el=document.createElement('div');
  el.textContent=msg;
  Object.assign(el.style,{
    position:'fixed',top:'1.3rem',right:'1.3rem',zIndex:9999,
    background:type==='err'?'#c92020':'var(--green)',
    color:'#fff',padding:'0.65rem 1.2rem',borderRadius:'6px',
    fontFamily:"'Barlow Condensed',sans-serif",fontWeight:'700',
    fontSize:'0.9rem',letterSpacing:'0.5px',
    boxShadow:'0 4px 24px rgba(0,0,0,0.6)',transition:'opacity 0.3s'
  });
  document.body.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),300);},2300);
}

// ═══════════════════ PÓDIO ═══════════════════
function renderPodium(p1, p3, wSF1, wSF2, lSF1, lSF2){
  const div = document.getElementById('podiumDiv');

  // Determine 2nd and 4th
  const p2 = p1 ? (p1 === wSF1 ? wSF2 : wSF1) : null;
  const p4 = p3 ? (p3 === lSF1 ? lSF2 : lSF1) : null;

  const places = [
    { rank:1, pos:'p1', medal:'🥇', label:'1° Lugar', team: p1 },
    { rank:2, pos:'p2', medal:'🥈', label:'2° Lugar', team: p2 },
    { rank:3, pos:'p3', medal:'🥉', label:'3° Lugar', team: p3 },
    { rank:4, pos:'p4', medal:'4°',  label:'4° Lugar', team: p4 },
  ];

  // Only show podium if at least final is done
  const finalDone = bracket.final.status === 'done';
  if(!finalDone){ div.innerHTML=''; return; }

  function members(t){
    if(!t || !t.members || !t.members.length) return '';
    return `<div class="podium-members">${t.members.join(' · ')}</div>`;
  }

  // Display order: 2nd, 1st, 3rd, 4th (classic podium visual)
  const ordered = [places[1], places[0], places[2], places[3]];

  div.innerHTML = `
    <div class="podium-section">
      <div class="podium-title">— Classificação Final —</div>
      <div class="podium-stage">
        ${ordered.map((p, vi) => `
          <div class="podium-slot ${p.pos}" style="animation-delay:${vi*100}ms">
            ${p.team
              ? `<div class="podium-medal">${p.rank <= 3 ? p.medal : ''}</div>
                 <div class="podium-dot" style="background:${p.team.color}"></div>
                 <div class="podium-team-name" style="color:${p.team.color}">${p.team.name}</div>`
              : `<div class="podium-medal" style="opacity:0.3">${p.medal}</div>
                 <div class="podium-team-name" style="color:var(--muted)">—</div>`
            }
            <div class="podium-block">
              <div class="podium-pos">${p.rank <= 3 ? p.rank : p.rank+'°'}</div>
              <div class="podium-pos-label">${p.label}</div>
            </div>
            ${p.team ? members(p.team) : ''}
          </div>`).join('')}
      </div>
    </div>`;
}

// ─── INIT ───
renderTeams(); renderBracket();
</script>
